apiVersion: apps/v1
kind: Deployment
metadata:
  name: signaltrack-backend
  labels:
    app.kubernetes.io/name: signaltrack-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: signaltrack-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: signaltrack-backend
    spec:
      containers:
        - name: api
          image: signaltrack-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: signaltrack-backend-config
            - secretRef:
                name: signaltrack-backend-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
