apiVersion: apps/v1
kind: Deployment
metadata:
  name: signaltrack-frontend
  labels:
    app.kubernetes.io/name: signaltrack-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: signaltrack-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: signaltrack-frontend
    spec:
      containers:
        - name: frontend
          image: signaltrack-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: signaltrack-frontend-config
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
