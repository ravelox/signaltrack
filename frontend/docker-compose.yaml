services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    image: signaltrack-frontend:local
    ports:
      - "3001:3000"
    environment:
      NEXT_PUBLIC_SIGNALTRACK_API_BASE_URL: "http://host.docker.internal:3000"
      NEXT_PUBLIC_SIGNALTRACK_USE_MOCKS: "false"
      NEXT_PUBLIC_SIGNALTRACK_USE_MOCK_AUTH: "false"
    restart: unless-stopped
